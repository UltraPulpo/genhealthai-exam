services:
  - type: web
    name: genhealthai-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend && npm ci && npm run build
      cp -r build/ ../backend/app/static/
    startCommand: bash startup.sh
    envVars:
      - key: APP_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///app.db
      - key: UPLOAD_FOLDER
        value: ./uploads
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.3"
